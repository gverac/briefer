<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Brief · Setup</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('dashboard') }}">🧾 Daily Brief</a>
    {% if session.get('auth') %}
    <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
    <label for="nav-toggle" class="nav-burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </label>
    <nav>
      <a href="{{ url_for('dashboard') }}">Briefs</a>
      <a href="{{ url_for('schedules') }}">Schedules</a>
      <a href="{{ url_for('settings') }}">Settings</a>
      <a href="{{ url_for('software') }}">Update</a>
      <a href="{{ url_for('wifi') }}">WiFi</a>
      <a href="{{ url_for('set_password') }}">Password</a>
      <a href="{{ url_for('logout') }}">Log out</a>
    </nav>
    {% endif %}
  </header>
  <main>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, m in msgs %}
        <div class="flash {{ cat }}">{{ m }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
